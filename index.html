<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deck Churrascaria | Pesquisa e Sorteio Premium</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --deck-wood: #d2995e; 
            --star-active: #f1c40f;
            --erro-cor: #ff6b6b;
        }

        html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; background-color: #1a1a1a; scroll-behavior: smooth; }

        body {
            font-family: 'Segoe UI', sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('madeira.JPG'); 
            background-size: 350px; background-repeat: repeat; background-attachment: fixed;
        }

        header { width: 100%; padding: 15px 10px 0; text-align: center; }
        .logo-img { width: 45%; max-width: 160px; filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8)); }

        .page-titles { text-align: center; margin: 5px 0 10px; }
        .main-title { font-size: 1.7rem; font-weight: 900; color: var(--deck-wood); text-transform: uppercase; margin: 0; letter-spacing: 1px; text-shadow: 1px 1px 10px rgba(0,0,0,1); }
        .sub-title { font-size: 1rem; color: #fff; text-transform: uppercase; font-weight: bold; margin-top: 2px; opacity: 0.9; text-shadow: 1px 1px 4px rgba(0,0,0,1); }

        .container { width: 92%; max-width: 420px; margin-bottom: 30px; }

        .card {
            background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
        }

        .pergunta-label { display: block; text-align: left; margin: 15px 0 10px; font-weight: bold; font-size: 0.85rem; color: #fff; text-shadow: 1px 1px 3px #000; position: relative; }
        .pergunta-label i { color: var(--deck-wood); margin-right: 8px; font-size: 0.9rem; }

        /* --- ESTILO DO BALÃO DE ERRO (TOOLTIP) --- */
        .balao-erro {
            position: absolute; bottom: 105%; left: 0; background: var(--erro-cor); color: #fff;
            padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold;
            white-space: nowrap; pointer-events: none; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none;
            animation: bounceIn 0.4s ease;
        }
        .balao-erro::after {
            content: ''; position: absolute; top: 100%; left: 15px;
            border-width: 6px; border-style: solid; border-color: var(--erro-cor) transparent transparent transparent;
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(5px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .stars { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; margin-bottom: 10px; padding: 10px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; position: relative; }
        .stars input { display: none; }
        .stars label { font-size: 2rem; color: rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
        .stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color: var(--star-active); text-shadow: 0 0 8px rgba(241, 196, 15, 0.5); }

        input, textarea {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; font-size: 1rem; outline: none; margin-bottom: 10px; transition: 0.3s;
        }

        .campo-erro { border-color: var(--erro-cor) !important; background: rgba(255, 107, 107, 0.05) !important; }
        .stars-erro { border-color: var(--erro-cor) !important; background: rgba(255, 107, 107, 0.1) !important; }

        .opcoes-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 20px; padding: 8px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; position: relative; }
        .opcao-item input { display: none; }
        .opcao-item label {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 2px; border-radius: 6px; font-size: 0.65rem; cursor: pointer; transition: 0.2s;
            height: 100%; text-align: center; text-transform: uppercase;
        }
        .opcao-item input:checked + label { background: rgba(210, 153, 94, 0.2); border-color: var(--deck-wood); color: var(--deck-wood); font-weight: bold; }

        .auth-group { margin-top: 15px; text-align: left; padding: 8px; border-radius: 10px; border: 1px solid transparent; transition: 0.3s; position: relative; }
        .auth-option { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; }
        .auth-option input[type="radio"] { width: 18px; height: 18px; margin-right: 12px; margin-bottom: 0; accent-color: var(--deck-wood); }
        .auth-text { font-size: 0.75rem; color: #ddd; }
        .auth-option:has(input:checked) { background: rgba(210, 153, 94, 0.15); border-color: var(--deck-wood); }

        .btn-enviar { background: var(--deck-wood); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1.1rem; margin-top: 20px; cursor: pointer; text-transform: uppercase; }

        #sucesso { display: none; padding: 30px 10px; }
        .check-icon { font-size: 4rem; color: #2ecc71; margin-bottom: 15px; }

        footer { padding: 25px 15px; font-size: 0.7rem; color: #bbb; text-align: center; width: 100%; }
        footer strong { color: #fff; }
    </style>
</head>
<body>

    <header>
        <img src="logo-deck.PNG" alt="Logo Deck" class="logo-img">
    </header>

    <div class="page-titles" id="titles">
        <h1 class="main-title">Deck Churrascaria</h1>
        <p class="sub-title">Pesquisa de Satisfação</p>
    </div>

    <div class="container">
        <div class="card" id="card-principal">
            <form id="feedback-form" novalidate>
                
                <label class="pergunta-label"><i class="fas fa-utensils"></i>O que você achou da Refeição? <span class="balao-erro">Preencha este campo</span></label>
                <div class="stars" id="grupo-refeicao">
                    <input type="radio" name="refeicao" id="c5" value="5" required><label for="c5" class="fas fa-star"></label>
                    <input type="radio" name="refeicao" id="c4" value="4"><label for="c4" class="fas fa-star"></label>
                    <input type="radio" name="refeicao" id="c3" value="3"><label for="c3" class="fas fa-star"></label>
                    <input type="radio" name="refeicao" id="c2" value="2"><label for="c2" class="fas fa-star"></label>
                    <input type="radio" name="refeicao" id="c1" value="1"><label for="c1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-concierge-bell"></i>Nota para o Atendimento: <span class="balao-erro">Preencha este campo</span></label>
                <div class="stars" id="grupo-atendimento">
                    <input type="radio" name="atendimento" id="a5" value="5" required><label for="a5" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a4" value="4"><label for="a4" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a3" value="3"><label for="a3" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a2" value="2"><label for="a2" class="fas fa-star"></label>
                    <input type="radio" name="atendimento" id="a1" value="1"><label for="a1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-thumbs-up"></i>Recomendaria o Deck? <span class="balao-erro">Preencha este campo</span></label>
                <div class="stars" id="grupo-recomenda">
                    <input type="radio" name="recomenda" id="r5" value="5" required><label for="r5" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r4" value="4"><label for="r4" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r3" value="3"><label for="r3" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r2" value="2"><label for="r2" class="fas fa-star"></label>
                    <input type="radio" name="recomenda" id="r1" value="1"><label for="r1" class="fas fa-star"></label>
                </div>

                <label class="pergunta-label"><i class="fas fa-bullhorn"></i>Como você conheceu o Deck? <span class="balao-erro">Preencha este campo</span></label>
                <div class="opcoes-grid" id="grupo-como-soube">
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-insta" value="Instagram" required><label for="opt-insta">Instagram</label></div>
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-face" value="Facebook"><label for="opt-face">Facebook</label></div>
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-google" value="Google"><label for="opt-google">Google</label></div>
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-amigos" value="Amigos"><label for="opt-amigos">Amigos</label></div>
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-passando" value="Passando"><label for="opt-passando">Passando</label></div>
                    <div class="opcao-item"><input type="radio" name="como_soube" id="opt-outros" value="Outros"><label for="opt-outros">Outros</label></div>
                </div>

                <label class="pergunta-label"><i class="fas fa-comment-dots"></i>Alguma sugestão ou elogio?</label>
                <textarea name="sugestoes" rows="2" placeholder="Sua opinião..."></textarea>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

                <div style="position: relative;">
                    <label class="pergunta-label"><i class="fas fa-user"></i>Seu Nome: <span class="balao-erro">Preencha este campo</span></label>
                    <input type="text" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div style="position: relative;">
                    <label class="pergunta-label"><i class="fab fa-whatsapp"></i>Seu WhatsApp: <span class="balao-erro">Preencha este campo</span></label>
                    <input type="tel" name="whatsapp" id="input-zap" placeholder="(19) 99999-9999" maxlength="15" required>
                </div>

                <div style="position: relative;">
                    <label class="pergunta-label"><i class="fas fa-envelope"></i>Seu E-mail: <span class="balao-erro" id="balao-email">Preencha este campo</span></label>
                    <input type="email" name="email" id="input-email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div style="position: relative;">
                    <label class="pergunta-label"><i class="fas fa-birthday-cake"></i>Sua Data de Nascimento: <span class="balao-erro">Preencha este campo</span></label>
                    <input type="date" name="nascimento" required>
                </div>

                <label class="pergunta-label">Autorização de Marketing: <span class="balao-erro">Preencha este campo</span></label>
                <div class="auth-group" id="grupo-autoriza">
                    <label class="auth-option"><input type="radio" name="autoriza_marketing" value="Sim" required><span class="auth-text">Autorizo envio de promoções.</span></label>
                    <label class="auth-option"><input type="radio" name="autoriza_marketing" value="Não" required><span class="auth-text">Não autorizo.</span></label>
                </div>

                <button type="submit" class="btn-enviar" id="btn-submit">ENVIAR E CONCORRER</button>
            </form>

            <div id="sucesso">
                <i class="fas fa-check-circle check-icon"></i>
                <h2 style="color: var(--deck-wood); margin-bottom: 10px;">OBRIGADO, <span id="span-nome"></span>!</h2>
                <button onclick="location.reload()" style="background:none; border:2px solid var(--deck-wood); color:#fff; padding:10px 20px; border-radius:10px; margin-top:25px; cursor:pointer; font-weight: bold;">NOVA AVALIAÇÃO</button>
            </div>
        </div>
    </div>

    <footer> Desenvolvido por <strong>Gabriel Piovesan</strong><br> © 2026 Deck Churrascaria </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        const f = document.getElementById('feedback-form');
        const btn = document.getElementById('btn-submit');
        const inputZap = document.getElementById('input-zap');

        // --- FUNÇÃO GLOBAL DE LIMPEZA ---
        function limparTudo() {
            document.querySelectorAll('.campo-erro, .stars-erro').forEach(el => el.classList.remove('campo-erro', 'stars-erro'));
            document.querySelectorAll('.balao-erro').forEach(el => el.style.display = 'none');
        }

        f.addEventListener('input', limparTudo);
        f.addEventListener('change', limparTudo);

        inputZap.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) e.target.value = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
            else if (v.length > 6) e.target.value = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
            else if (v.length > 2) e.target.value = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
            else e.target.value = v.replace(/^(\d*)$/, "($1");
        });

        const scriptURL = 'COLOQUE_AQUI_O_LINK_DO_SCRIPT_DA_PLANILHA_DO_DECK';

        f.onsubmit = (e) => {
            e.preventDefault();
            limparTudo();
            let erros = [];
            
            // 1. Valida Radios (Estrelas, Grid, Autorização)
            const grupos = ['refeicao', 'atendimento', 'recomenda', 'como_soube', 'autoriza_marketing'];
            grupos.forEach(nome => {
                if (!f.querySelector(`input[name="${nome}"]:checked`)) {
                    let container = document.getElementById(nome === 'como_soube' ? 'grupo-como-soube' : nome === 'autoriza_marketing' ? 'grupo-autoriza' : `grupo-${nome}`);
                    let balao = container.previousElementSibling.querySelector('.balao-erro');
                    container.classList.add('stars-erro');
                    balao.style.display = 'block';
                    erros.push(container);
                }
            });

            // 2. Valida Inputs (Nome, Zap, Email, Data)
            f.querySelectorAll('input[required]:not([type="radio"])').forEach(input => {
                let balao = input.previousElementSibling.querySelector('.balao-erro');
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (!input.value.trim()) {
                    input.classList.add('campo-erro');
                    balao.innerText = "Preencha este campo";
                    balao.style.display = 'block';
                    erros.push(input);
                } else if (input.type === 'email' && !emailRegex.test(input.value)) {
                    input.classList.add('campo-erro');
                    balao.innerText = "E-mail inválido";
                    balao.style.display = 'block';
                    erros.push(input);
                }
            });

            if (erros.length > 0) {
                erros[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            btn.innerText = "ENVIANDO..."; btn.disabled = true;
            fetch(scriptURL, { method: 'POST', body: new FormData(f) })
                .then(() => {
                    document.getElementById('titles').style.display = 'none';
                    document.getElementById('span-nome').innerText = f.nome.value.split(' ')[0].toUpperCase();
                    f.style.display = 'none';
                    document.getElementById('sucesso').style.display = 'block';
                    window.scrollTo(0, 0);
                }).catch(() => { btn.innerText = "ERRO! TENTE NOVAMENTE."; btn.disabled = false; });
        };
    </script>
</body>
</html>
